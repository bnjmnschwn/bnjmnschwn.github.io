<!DOCTYPE html>
<html lang="de">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script src="https://kit.fontawesome.com/c556b1bf0b.js" crossorigin="anonymous"></script>
	<link href="https://fonts.googleapis.com/css?family=Josefin%20Sans" rel="stylesheet">
	<title>velovivre</title>

	<style>
	* {
		box-sizing: border-box;
		font-family: Arial, Helvetica, sans-serif;
	}

	body, html {
		height: 100%;
		margin: 0 auto;
	}

	.bg {
		background-image: url('/theme/images/bgimg.jpeg');
		background-position: center center;
		background-repeat: no-repeat;
		background-size: cover;
		background-attachement: fixed;
		opacity: 0.8;
		text-align: center;
		font-size: 16px;
		background-color: #fbf9fb;
		height: 100%;
		width: 100%;
		z-index: 0;
		position: fixed;
		}

		h1, h2 {
			color: #FFFFFF;
			font-family: "Josefin Sans";
			font-weight: 900;
			text-transform: uppercase;
			/*font-style: italic;*/
			letter-spacing: 0.04em;
			margin-bottom: 1em;
			font-size: 1.2em;
			text-align: center;
			display: block;
		}
		

		.header {
			margin: 0 auto;
			text-align: center;
			z-index: 2;
			position: sticky;
			top: 75%;
		}
		
		.social {
			margin: 0 auto;
			text-align: center;
		}
		
		a.social-icons {
			text-decoration: none;
			color: #FFFFFF;
			padding: 1em 0.5em;
			display: inline-block;
		}

		a.social-icons:hover {
			color: #9CA695;
			transition: 0.3s ease-in;
	</style>
</head>

<body>
	<div class="bg">
		<div class="header">
		<h1>out riding.</h1>
		<h2>velovivre is back soon</h2>
		<div class="social">
			<a href="https://instagram.com/bnjmnschwn" target=_blank class="social-icons"><i class="fab fa-instagram fa-lg"></i></a>
			<a href="https://twitter.com/bnjmnschwn" target=_blank class="social-icons"><i class="fab fa-twitter fa-lg"></i></a>
			<a href="https://www.strava.com/athletes/1292066" target=_blank class="social-icons"><i class="fab fa-strava fa-lg"></i></a>
			<a href="https://www.linkedin.com/in/benjamin-schwan/" target=_blank class="social-icons"><i class="fab fa-linkedin fa-lg"></i></a>
			<a href="mailto:contact@velovivre.de" target=_blank class="social-icons"><i class="fas fa-envelope fa-lg"></i></a>
		</div>
		</div>
	</div>
</body>
</html>
